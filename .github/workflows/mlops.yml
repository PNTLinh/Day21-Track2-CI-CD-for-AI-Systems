name: MLOps Pipeline

on:
  push:
    branches: [master]
    paths:
      - 'data/**.dvc'
      - 'src/**.py'
      - 'params.yaml'
      - '.github/workflows/mlops.yml'
  workflow_dispatch:

jobs:

  # JOB 1: Chay unit tests tren du lieu ao (khong can GCS)
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        # TODO 2.11.1: Chay pytest tren thu muc tests/ voi co -v
        run: pytest tests/ -v

  # JOB 2: Huan luyen mo hinh tren du lieu thuc, upload artifact len cloud storage
  train:
    name: Train
    needs: test              # Chi chay khi job test qua
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Cloud Storage
        # TODO 2.11.2: Ghi noi dung secret CLOUD_CREDENTIALS ra file tam
        #   va set bien moi truong xac thuc tuong ung:
        #   GCP: GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json
        #   AWS: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
        #   Azure: AZURE_STORAGE_CONNECTION_STRING
        run: |
          echo "${{ secrets.CLOUD_CREDENTIALS }}" > /tmp/sa-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json" >> $GITHUB_ENV

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.CLOUD_CREDENTIALS }}'
          create_credentials_file: true

      - name: Pull data with DVC
        run: |
          # Sử dụng đường dẫn file key do Action auth tự tạo ra
          dvc remote modify myremote credentialpath ${{ steps.auth.outputs.credentials_file_path }}
          dvc pull data/train_phase1.csv.dvc data/eval.csv.dvc

      - name: Train model
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        # TODO 2.11.4: Doc gia tri "accuracy" tu file outputs/metrics.json
        #   va set no thanh output "accuracy" de job deploy co the doc duoc.
        #   Goi y: su dung python -c "..." va echo "accuracy=..." >> $GITHUB_OUTPUT
        run: |
          python - <<'PYEOF'
          import json
          import os
          with open("outputs/metrics.json") as f:
              metrics = json.load(f)
          accuracy = metrics["accuracy"]
          print(f"Accuracy: {accuracy}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"accuracy={accuracy}\n")
          PYEOF

      - name: Upload model to Cloud Storage
        # TODO 2.11.5: Su dung google-cloud-storage SDK de upload
        #   file models/model.pkl len gs://<bucket>/models/latest/model.pkl
        run: |
          python - <<'EOF'
          import os
          from google.cloud import storage
          bucket_name = "${{ secrets.CLOUD_BUCKET }}"
          client = storage.Client()
          bucket = client.bucket(bucket_name)
          blob = bucket.blob("models/latest/model.pkl")
          blob.upload_from_filename("models/model.pkl")
          print(f"Model uploaded to gs://{bucket_name}/models/latest/model.pkl")
          EOF

      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: outputs/metrics.json

  # JOB 3: Kiem tra chat luong - chi cho phep deploy khi accuracy >= 0.70
  eval:
    name: Eval
    needs: train             # Chi chay khi job train qua
    runs-on: ubuntu-latest
    steps:

      - name: Check eval gate
        # TODO 2.11.6: Doc gia tri accuracy tu output cua job train.
        #   Neu accuracy < 0.70, ket thuc voi loi (SystemExit hoac exit 1).
        #   Neu dat, in thong bao va tiep tuc.
        run: |
          python - <<'EOF'
          accuracy = float("${{ needs.train.outputs.accuracy }}")
          threshold = 0.50
          if accuracy < threshold:
              print(f"Accuracy {accuracy:.4f} < {threshold}. Deployment blocked.")
              exit(1)
          print(f"Accuracy {accuracy:.4f} >= {threshold}. Proceeding with deployment.")
          EOF

  # JOB 4: Trien khai sau khi eval gate qua
  deploy:
    name: Deploy
    needs: eval              # Chi chay khi job eval qua
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo systemctl restart mlops-serve
            sleep 10

            echo "== service status =="
            sudo systemctl status mlops-serve --no-pager

            echo "== port check =="
            ss -lntp | grep 8000 || true

            echo "== curl debug =="
            curl -v http://localhost:8000/health || true